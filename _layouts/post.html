---
layout: base
---

{% if page.lang == "ne" %}
  {% include nav-ne.html %}
{% else %}
  {% include nav-en.html %}
{% endif %}

<article class="reading-container {{ page.lang }}">
  <header class="post-header">
    <h1>{{ page.title }}</h1>

    <p class="post-meta">
      {{ page.author }} · {{ page.category }} ·
      {{ page.date | date: "%B %d, %Y" }} ·
      <span id="reading-time"></span>
    </p>

    <div class="progress-container">
      <div id="progress-bar"></div>
    </div>
  </header>

  <div class="post-content {{ page.lang }}">
    {{ content }}
  </div>

  <div class="reader-panel">
    <div class="panel-group">
      <button type="button" onclick="changeFontSize(1)">A+</button>
      <button type="button" onclick="changeFontSize(-1)">A-</button>
    </div>

    <div class="panel-group">
      <button type="button" onclick="toggleFocus()" aria-label="Toggle focus mode">Focus</button>
      <button type="button" onclick="scrollToTop()" aria-label="Scroll to top">Top</button>
    </div>
  </div>
</article>
