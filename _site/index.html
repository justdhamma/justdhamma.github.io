<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gentium+Plus:wght@400;700&family=Noto+Serif+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
  <title>Just Dhamma</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      background: #ffffff;
      color: #111111;
      font-family: "Gentium Plus", Georgia, serif;
      text-align: center;
    }

    h1,
    h2,
    p {
      margin-left: auto;
      margin-right: auto;
      max-width: 24rem;
    }

    h1 {
      margin-bottom: 0.35rem;
      font-size: clamp(2rem, 5vw, 3rem);
      letter-spacing: 0.04em;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 1rem;
      font-size: clamp(1.25rem, 3vw, 1.8rem);
      font-weight: 600;
    }

    p {
      margin-bottom: 1.5rem;
      color: #555555;
      font-size: 1.05rem;
    }

    a {
      margin: 0 10px;
      color: #2563eb;
      font-size: clamp(1.1rem, 3vw, 1.35rem);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .ne {
      font-family: "Noto Serif Devanagari", serif;
    }
  </style>
</head>
<body>
  <h1>Just Dhamma</h1>
  <h2 class="ne">मूल्यहरू र दर्शन</h2>
  <p>Choose Language / भाषा छान्नुहोस्</p>

  <div>
    <a href="/en/">English</a>
    <a href="/ne/" class="ne">नेपाली</a>
  </div>
</body>
</html>
