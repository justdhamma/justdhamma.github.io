<article class="reading-container ne">

  <!-- <div id="continue-reading" style="display:none;">
    Continue reading from where you left off →
  </div> -->

  <script>
    document.getElementById("continue-reading").onclick = function () {
      const saved = localStorage.getItem("scrollPosition");
      if (saved) {
        window.scrollTo({ top: parseInt(saved, 10), behavior: "smooth" });
      }
    };
  </script>

  <header class="post-header">
    <h1>तेस्रो निबन्ध</h1>

    <p class="post-meta">
      January 03, 2026
      ·
      <span id="reading-time"></span>
    </p>

    <!-- Progress bar (inside header for cleaner integration) -->
    <div class="progress-container">
      <div id="progress-bar"></div>
    </div>

  </header>

  <div class="post-content ne">
    <p>यो निबन्धको पूरा सामग्री यहाँ सुरु हुन्छ…</p>

  </div>
