<div class="reader-panel">
  <div class="panel-group">
    <button type="button" onclick="changeFontSize(1)" aria-label="Increase font size">A+</button>
    <button type="button" onclick="changeFontSize(-1)" aria-label="Decrease font size">A-</button>
  </div>

  <div class="panel-group">
    <button id="focus-toggle" type="button" onclick="toggleFocus()" aria-label="Enter reading mode">📖</button>
    <button id="top-toggle" type="button" onclick="scrollToTop()" aria-label="Dharma wheel">☸</button>
  </div>
</div>
